<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Miroir de Débat</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1B3A6B;
  --blue2:#22487f;
  --blue3:#2a5494;
  --gold:#F0B940;
  --gold2:#D4A030;
  --gold-glow:rgba(240,185,64,0.15);
  --gold-border:rgba(240,185,64,0.4);
  --w:rgba(255,255,255,1);
  --w2:rgba(255,255,255,0.72);
  --w3:rgba(255,255,255,0.38);
  --w4:rgba(255,255,255,0.09);
  --w5:rgba(255,255,255,0.06);
  --r:14px;
  --r2:10px;
  --r3:22px;
  --ft:'Syne',sans-serif;
  --fb:'Plus Jakarta Sans',sans-serif;
}
html,body{min-height:100%;background:var(--blue);color:var(--w);font-family:var(--fb);font-size:16px;-webkit-font-smoothing:antialiased}
.screen{display:none}
.screen.active{display:block}

/* ── HOME ── */
#home{display:none;min-height:100vh}
#home.active{
  display:flex;align-items:center;justify-content:center;
  padding:2rem 1rem;
  background:radial-gradient(ellipse at 25% 60%,rgba(42,84,148,0.7) 0%,transparent 55%),radial-gradient(ellipse at 80% 15%,rgba(240,185,64,0.07) 0%,transparent 45%),var(--blue);
}
.card{
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.13);
  border-radius:var(--r3);
  padding:2.75rem;
  width:100%;max-width:660px;
}
.htitle{
  font-family:var(--ft);
  font-size:clamp(2.4rem,6vw,3.6rem);
  font-weight:800;
  line-height:1.05;
  letter-spacing:-0.025em;
  margin-bottom:0.7rem;
}
.htitle span{color:var(--gold)}
.hsub{font-size:0.97rem;line-height:1.6;color:var(--w2);margin-bottom:2.25rem}

.lbl{font-size:0.68rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);margin-bottom:0.55rem;display:block}

.conv{
  width:100%;min-height:88px;
  background:rgba(255,255,255,0.09);
  border:1.5px solid rgba(255,255,255,0.14);
  border-radius:var(--r);
  color:var(--w);font-family:var(--fb);font-size:1rem;line-height:1.6;
  padding:0.85rem 1rem;resize:none;outline:none;
  transition:border-color .2s,background .2s;
}
.conv::placeholder{color:var(--w3)}
.conv:focus{border-color:var(--gold-border);background:rgba(255,255,255,0.12)}
.hint{font-size:0.6rem;color:var(--w3);text-align:right;margin-top:0.3rem}

.sec{margin-top:1.75rem}

.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.pbtn{
  background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,255,255,0.1);
  border-radius:var(--r);
  padding:13px 11px 11px;
  cursor:pointer;text-align:left;
  transition:all .16s;
}
.pbtn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.22);transform:translateY(-2px)}
.pbtn.on{background:var(--gold-glow);border-color:var(--gold)}
.pi{font-size:1.25rem;display:block;margin-bottom:6px;line-height:1}
.pn{font-family:var(--ft);font-size:0.73rem;font-weight:700;color:var(--w);display:block}
.pd{font-size:0.6rem;color:var(--w3);margin-top:2px}

.opts{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-top:1.75rem}
.trow{display:flex;gap:7px;flex-wrap:wrap;margin-top:0.55rem}
.tbtn{
  padding:7px 16px;
  background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,255,255,0.1);
  border-radius:50px;
  color:var(--w2);font-family:var(--fb);font-size:0.78rem;font-weight:500;
  cursor:pointer;transition:all .15s;
}
.tbtn:hover{background:rgba(255,255,255,0.14);color:var(--w)}
.tbtn.on{background:var(--gold-glow);border-color:var(--gold);color:var(--gold)}

.cta{
  width:100%;margin-top:2rem;padding:16px 22px;
  background:var(--gold);border:none;border-radius:var(--r);
  color:var(--blue);font-family:var(--ft);font-size:1rem;font-weight:800;
  cursor:pointer;transition:all .18s;
  display:flex;align-items:center;justify-content:space-between;
}
.cta:hover{background:var(--gold2);transform:translateY(-2px);box-shadow:0 10px 28px rgba(240,185,64,0.28)}
.cta:active{transform:translateY(0)}
.cta:disabled{opacity:0.32;cursor:not-allowed;transform:none;box-shadow:none}
.arr{font-size:1.2rem;transition:transform .15s}
.cta:not(:disabled):hover .arr{transform:translateX(5px)}

/* ── DEBATE ── */
#debate{display:none;height:100vh;flex-direction:column}
#debate.active{display:flex;background:var(--blue)}

.dbar{
  display:flex;align-items:center;gap:10px;
  padding:0.85rem 1.4rem;
  background:rgba(0,0,0,0.18);flex-shrink:0;
}
.bback{
  background:rgba(255,255,255,0.1);border:none;border-radius:50px;
  color:var(--w2);font-family:var(--fb);font-weight:500;font-size:0.78rem;
  padding:6px 14px;cursor:pointer;transition:all .15s;
}
.bback:hover{background:rgba(255,255,255,0.18);color:var(--w)}
.dmeta{flex:1;display:flex;gap:7px;align-items:center}
.bdg{
  font-size:0.68rem;font-weight:500;
  padding:4px 12px;border-radius:50px;
  background:var(--gold-glow);border:1px solid var(--gold-border);color:var(--gold);
}
.cstrip{
  padding:0.6rem 1.4rem;background:rgba(0,0,0,0.1);
  font-size:0.86rem;color:var(--w3);font-style:italic;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;
}
.cstrip::before{content:'"';color:var(--gold);margin-right:3px}
.cstrip::after{content:'"';color:var(--gold);margin-left:3px}

.msgs{
  flex:1;overflow-y:auto;padding:1.4rem;
  display:flex;flex-direction:column;gap:1rem;scroll-behavior:smooth;
}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px}

.msg{display:flex;flex-direction:column;max-width:78%;animation:fu .25s ease forwards}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.u{align-self:flex-end;align-items:flex-end}
.msg.a{align-self:flex-start;align-items:flex-start}
.mwho{font-size:0.62rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;opacity:0.55}
.msg.u .mwho{color:var(--w)}
.msg.a .mwho{color:var(--gold)}
.mbub{padding:0.85rem 1.1rem;border-radius:var(--r);font-size:0.97rem;line-height:1.65}
.msg.u .mbub{background:rgba(255,255,255,0.13);color:var(--w);border-bottom-right-radius:var(--r2)}
.msg.a .mbub{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:var(--w);border-bottom-left-radius:var(--r2)}

.tyb{
  display:flex;gap:5px;align-items:center;
  padding:0.85rem 1.1rem;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  border-radius:var(--r);border-bottom-left-radius:var(--r2);
}
.dot{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:pu 1.3s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes pu{0%,80%,100%{opacity:.3;transform:scale(1)}40%{opacity:1;transform:scale(1.35)}}

.binwrap{display:flex;gap:10px;animation:fu .2s ease forwards}
.binbtn{
  flex:1;padding:12px;border-radius:var(--r);
  font-family:var(--ft);font-size:0.95rem;font-weight:700;
  cursor:pointer;transition:all .15s;border:1.5px solid;
}
.boui{background:var(--gold-glow);border-color:var(--gold);color:var(--gold)}
.boui:hover{background:var(--gold);color:var(--blue)}
.bnon{background:rgba(220,80,80,0.1);border-color:rgba(220,80,80,0.45);color:rgba(255,120,120,1)}
.bnon:hover{background:rgba(190,55,55,0.65);color:var(--w);border-color:rgba(190,55,55,0.65)}

.izone{
  padding:0.9rem 1.4rem;background:rgba(0,0,0,0.15);
  display:flex;gap:10px;align-items:flex-end;flex-shrink:0;
}
.uinp{
  flex:1;background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.14);
  border-radius:var(--r);color:var(--w);font-family:var(--fb);font-size:0.95rem;
  line-height:1.5;min-height:42px;max-height:120px;
  padding:9px 13px;resize:none;outline:none;transition:border-color .2s;
}
.uinp::placeholder{color:var(--w3)}
.uinp:focus{border-color:var(--gold-border)}
.uinp:disabled{opacity:0.3}
.sbtn{
  width:42px;height:42px;background:var(--gold);border:none;border-radius:var(--r);
  color:var(--blue);cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;
}
.sbtn:hover{background:var(--gold2);transform:scale(1.06)}
.sbtn:disabled{opacity:0.28;cursor:not-allowed;transform:none}
.sbtn svg{width:16px;height:16px}

.dfooter{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.55rem 1.4rem;background:rgba(0,0,0,0.1);flex-shrink:0;
}
.tc{font-size:0.63rem;color:var(--w3);font-weight:500}
.vbtn{
  font-size:0.72rem;font-weight:600;
  padding:6px 16px;background:rgba(240,185,64,0.1);
  border:1.5px solid var(--gold-border);border-radius:50px;
  color:var(--w3);cursor:pointer;transition:all .15s;
}
.vbtn:not(:disabled):hover{background:var(--gold-glow);color:var(--gold);border-color:var(--gold)}
.vbtn:disabled{opacity:0.28;cursor:not-allowed}

/* ── VERDICT ── */
#verdict{display:none;min-height:100vh}
#verdict.active{
  display:flex;align-items:flex-start;justify-content:center;
  padding:2rem 1rem 4rem;
  background:radial-gradient(ellipse at 80% 80%,rgba(42,84,148,0.55) 0%,transparent 55%),var(--blue);
}
.vpage{width:100%;max-width:680px;padding:0.5rem 0 2rem}
.vnav{display:flex;justify-content:space-between;align-items:center;margin-bottom:2.75rem}
.bnew{
  padding:9px 20px;background:var(--gold);border:none;border-radius:50px;
  color:var(--blue);font-family:var(--ft);font-size:0.85rem;font-weight:800;
  cursor:pointer;transition:all .15s;
}
.bnew:hover{background:var(--gold2);transform:translateY(-1px)}
.vey{font-size:0.68rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:0.7rem}
.vh{font-family:var(--ft);font-size:clamp(2.2rem,5vw,3.2rem);font-weight:800;line-height:1.05;letter-spacing:-0.02em;margin-bottom:0.7rem}
.vq{
  font-style:italic;color:var(--w2);font-size:0.93rem;
  padding:0.7rem 1rem;background:rgba(255,255,255,0.07);
  border-radius:var(--r);margin-bottom:2rem;
}
.vs{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);
  border-radius:var(--r);padding:1.4rem;margin-bottom:0.85rem;
  animation:fu .4s ease forwards;
}
.vsl{font-size:0.63rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:0.55rem}
.vst{font-size:0.97rem;line-height:1.7;color:var(--w2)}
.vsf{background:var(--gold-glow);border-color:var(--gold-border)}
.vsf .vst{color:var(--w);font-style:italic}
.vload{display:flex;flex-direction:column;align-items:center;gap:1.5rem;padding:5rem 0;color:var(--w3);font-style:italic}
.vdots{display:flex;gap:7px}
.vdots span{width:7px;height:7px;background:var(--gold);border-radius:50%;animation:pu 1.3s infinite}
.vdots span:nth-child(2){animation-delay:.2s}
.vdots span:nth-child(3){animation-delay:.4s}

@media(max-width:580px){
  .card{padding:1.75rem 1.25rem}
  .pgrid{grid-template-columns:repeat(2,1fr)}
  .opts{grid-template-columns:1fr}
  .msg{max-width:92%}
}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="card">
    <h1 class="htitle">Défends ce que<br>tu <span>crois vraiment.</span></h1>
    <p class="hsub">Un contradicteur implacable attaque ta conviction jusqu'à ce qu'elle tienne debout ou s'effondre.</p>

    <label class="lbl" for="conviction">Ta conviction</label>
    <textarea id="conviction" class="conv" placeholder="Ex : Je suis contre l'anarchie car toute société a besoin d'ordre…" rows="3" maxlength="300"></textarea>
    <div class="hint"><span id="charCount">0</span> / 300</div>

    <div class="sec">
      <label class="lbl">Choisis ton contradicteur</label>
      <div class="pgrid" id="personaGrid">
        <button class="pbtn on" data-persona="philosopher"><span class="pi">🏛</span><span class="pn">Philosophe</span><span class="pd">Socrate · Nietzsche</span></button>
        <button class="pbtn" data-persona="economist"><span class="pi">📊</span><span class="pn">Économiste</span><span class="pd">Données · Marchés</span></button>
        <button class="pbtn" data-persona="scientist"><span class="pi">🔬</span><span class="pn">Scientifique</span><span class="pd">Preuves · Méthode</span></button>
        <button class="pbtn" data-persona="lawyer"><span class="pi">⚖</span><span class="pn">Juriste</span><span class="pd">Précision · Droit</span></button>
        <button class="pbtn" data-persona="activist"><span class="pi">✊</span><span class="pn">Militant</span><span class="pd">Impact · Humain</span></button>
        <button class="pbtn" data-persona="devil"><span class="pi">👁</span><span class="pn">Avocat du diable</span><span class="pd">Sans limite</span></button>
      </div>
    </div>

    <div class="opts">
      <div>
        <label class="lbl">Férocité</label>
        <div class="trow" id="ferocityGroup">
          <button class="tbtn" data-val="soft">Douce</button>
          <button class="tbtn on" data-val="normal">Vive</button>
          <button class="tbtn" data-val="brutal">Brutale</button>
        </div>
      </div>
      <div>
        <label class="lbl">Stratégie</label>
        <div class="trow" id="modeGroup">
          <button class="tbtn on" data-val="attack">Attaque</button>
          <button class="tbtn" data-val="steelman">Steel Man</button>
        </div>
      </div>
    </div>

    <button class="cta" id="startBtn" disabled>
      <span>Entrer dans l'arène</span>
      <span class="arr">→</span>
    </button>
  </div>
</div>

<!-- DEBATE -->
<div id="debate" class="screen">
  <div class="dbar">
    <button class="bback" id="backBtn">← Quitter</button>
    <div class="dmeta">
      <span class="bdg" id="personaBadge"></span>
      <span class="bdg" id="ferocityBadge"></span>
    </div>
  </div>
  <div class="cstrip" id="convictionStrip"></div>
  <div class="msgs" id="messages" role="log"></div>
  <div class="izone">
    <textarea class="uinp" id="userInput" placeholder="Défends ta position…" rows="1" disabled></textarea>
    <button class="sbtn" id="sendBtn" disabled>
      <svg viewBox="0 0 20 20" fill="none"><path d="M3 10L17 3L10 17L9 11L3 10Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <div class="dfooter">
    <span class="tc" id="turnCount">0 échange</span>
    <button class="vbtn" id="verdictBtn" disabled>Demander le verdict</button>
  </div>
</div>

<!-- VERDICT -->
<div id="verdict" class="screen">
  <div class="vpage">
    <div class="vnav">
      <button class="bback" id="backToDebate">← Retour au débat</button>
      <button class="bnew" id="newDebate">Nouveau débat</button>
    </div>
    <p class="vey">Verdict final</p>
    <h2 class="vh">Le tribunal<br>a tranché.</h2>
    <p class="vq" id="verdictQuote"></p>
    <div id="verdictBody">
      <div class="vload"><div class="vdots"><span></span><span></span><span></span></div><p>Analyse du débat en cours…</p></div>
    </div>
  </div>
</div>

<script>
const MISTRAL_API_KEY = 'REMPLACE_PAR_TA_CLE_MISTRAL';

const PERSONAS = {
  philosopher:{label:'Philosophe',icon:'🏛',prompt:`Tu es un philosophe socratique. Tu utilises la maïeutique pour révéler les contradictions internes. Tu t'appuies sur Socrate, Nietzsche, Kant. Tu déconstruis les prémisses avant d'attaquer la conclusion.`},
  economist:  {label:'Économiste',icon:'📊',prompt:`Tu es un économiste rigoureux. Tu exiges des données empiriques, tu montres les incentives ignorés, les externalités, les corrélations confondues avec des causalités.`},
  scientist:  {label:'Scientifique',icon:'🔬',prompt:`Tu es un scientifique méthodique. Tu réclames des preuves reproductibles, identifies les biais cognitifs, distingues corrélation et causalité.`},
  lawyer:     {label:'Juriste',icon:'⚖',prompt:`Tu es un juriste précis. Tu relèves chaque imprécision sémantique, généralisation abusive, exception non prise en compte.`},
  activist:   {label:'Militant',icon:'✊',prompt:`Tu es un militant engagé. Tu ramènes chaque argument à ses conséquences humaines concrètes. Tu interpelles la conscience morale.`},
  devil:      {label:'Avocat du diable',icon:'👁',prompt:`Tu es l'avocat du diable absolu. Tu défends l'opposé de toute conviction avec une logique implacable et cynique. Tu n'as aucune limite rhétorique.`},
};
const FEROCITY = {
  soft:  {label:'Douce',  prompt:'Ton ton est stimulant mais bienveillant. Tu reconnais les points valides avant de les nuancer.'},
  normal:{label:'Vive',   prompt:'Ton ton est ferme et direct. Tu attaques les failles sans ménagement.'},
  brutal:{label:'Brutale',prompt:"Ton ton est implacable. Tu n'accordes aucune concession. Tu frappes sur les contradictions les plus profondes."},
};
const MODE = {
  attack:  {prompt:"STRATÉGIE : identifie la faille la plus profonde et exploite-la. Attaque d'abord les prémisses, puis la logique, puis les conséquences."},
  steelman:{prompt:"STRATÉGIE : formule d'abord la version la plus solide de l'argument adverse, puis explique pourquoi même cette version reste insuffisante."},
};

let S={conviction:'',persona:'philosopher',ferocity:'normal',mode:'attack',history:[],turns:0,loading:false,waitingBinary:false};

const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active')}

const convEl=$('conviction'),charEl=$('charCount'),startEl=$('startBtn');
convEl.addEventListener('input',()=>{charEl.textContent=convEl.value.length;startEl.disabled=convEl.value.trim().length<10});

document.querySelectorAll('.pbtn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.pbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');S.persona=b.dataset.persona}));
document.querySelectorAll('#ferocityGroup .tbtn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('#ferocityGroup .tbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');S.ferocity=b.dataset.val}));
document.querySelectorAll('#modeGroup .tbtn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('#modeGroup .tbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');S.mode=b.dataset.val}));

startEl.addEventListener('click',startDebate);
$('backBtn').addEventListener('click',()=>{if(confirm('Abandonner ce débat ?')){resetState();showScreen('home')}});
$('verdictBtn').addEventListener('click',requestVerdict);
$('backToDebate').addEventListener('click',()=>showScreen('debate'));
$('newDebate').addEventListener('click',()=>{resetState();convEl.value='';charEl.textContent='0';startEl.disabled=true;showScreen('home')});

const inputEl=$('userInput'),sendEl=$('sendBtn');
inputEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}});
inputEl.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'});
sendEl.addEventListener('click',()=>sendMsg());

async function startDebate(){
  S.conviction=convEl.value.trim();S.history=[];S.turns=0;S.waitingBinary=false;
  const p=PERSONAS[S.persona];
  $('personaBadge').textContent=`${p.icon} ${p.label}`;
  $('ferocityBadge').textContent=FEROCITY[S.ferocity].label;
  $('convictionStrip').textContent=S.conviction;
  $('messages').innerHTML='';$('turnCount').textContent='0 échange';$('verdictBtn').disabled=true;
  showScreen('debate');setLoading(true);
  const opening=`Je soutiens que : ${S.conviction}`;
  S.history.push({role:'user',content:opening});
  try{const r=await callMistral(S.history);S.history.push({role:'assistant',content:r});hideTyping();renderAI(r);S.turns=1;refreshTurns()}
  catch(e){hideTyping();renderAI('Erreur de connexion. Vérifie ta clé API dans le fichier HTML.');console.error(e)}
  setLoading(false);
}

async function sendMsg(override){
  const txt=override??inputEl.value.trim();
  if(!txt||S.loading)return;
  if(!override){inputEl.value='';inputEl.style.height='auto'}
  removeBinary();S.waitingBinary=false;
  renderUser(txt);S.history.push({role:'user',content:txt});setLoading(true);
  try{const r=await callMistral(S.history);S.history.push({role:'assistant',content:r});hideTyping();renderAI(r);S.turns++;refreshTurns();if(S.turns>=3)$('verdictBtn').disabled=false}
  catch(e){hideTyping();renderAI('Erreur réseau. Réessaie.');console.error(e)}
  setLoading(false);
}

async function requestVerdict(){
  $('verdictQuote').textContent=S.conviction;
  $('verdictBody').innerHTML='<div class="vload"><div class="vdots"><span></span><span></span><span></span></div><p>Analyse du débat en cours…</p></div>';
  showScreen('verdict');
  try{const v=await callVerdictMistral();renderVerdict(v)}
  catch(e){$('verdictBody').innerHTML='<p style="color:var(--w3);font-style:italic">Erreur lors du verdict.</p>'}
}

function buildSystemPrompt(){
  const p=PERSONAS[S.persona],f=FEROCITY[S.ferocity],m=MODE[S.mode];
  return `${p.prompt}\n\n${f.prompt}\n\n${m.prompt}\n\nFORMAT STRICT :\nChaque réplique :\n1. Une ou deux phrases qui répondent directement à ce que vient de dire l'interlocuteur.\n2. Un argument court et percutant.\n3. UNE seule question fermée piège — si oui ça contredit sa thèse, si non ça révèle une incohérence.\n4. Termine par exactement : [Réponds par oui ou non]\n\nINTERDICTIONS :\nJamais "Bonne question", "Certainement", "Tout à fait", "En effet", "Absolument"\nJamais de listes à tirets ou numérotées\nJamais de gras, italique ou markdown\nJamais "En tant que..." ou "Selon ma perspective..."\nMaximum 160 mots\nUne seule question par réplique\nPas de méta-commentaire\nNe jamais répéter un argument déjà utilisé\nTu parles comme un humain dans un vrai débat, pas comme une IA\n\nConviction de l'adversaire : "${S.conviction}"`;
}

async function callMistral(history){
  showTyping();
  const res=await fetch('https://api.mistral.ai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${MISTRAL_API_KEY}`},body:JSON.stringify({model:'mistral-large-latest',max_tokens:400,temperature:0.85,messages:[{role:'system',content:buildSystemPrompt()},...history]})});
  if(!res.ok)throw new Error(`Mistral ${res.status}`);
  const d=await res.json();return d.choices?.[0]?.message?.content??'';
}

async function callVerdictMistral(){
  const transcript=S.history.map(m=>`${m.role==='user'?'DÉFENSEUR':'CONTRADICTEUR'} : ${m.content}`).join('\n\n');
  const system=`Tu es un arbitre impartial. Analyse ce débat et produis un verdict en JSON strict (sans markdown, sans backticks) :\n{"strengths":"...","weaknesses":"...","fatal":"...","verdict":"..."}\nstrenths : 2-3 arguments solides du défenseur. weaknesses : 2-3 failles exposées. fatal : l'argument le plus dévastateur non contré. verdict : 2-3 phrases tranchées. Tout en français. Tu t'adresses directement au défenseur.`;
  const res=await fetch('https://api.mistral.ai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${MISTRAL_API_KEY}`},body:JSON.stringify({model:'mistral-large-latest',max_tokens:700,temperature:0.4,messages:[{role:'system',content:system},{role:'user',content:`Conviction : "${S.conviction}"\n\n${transcript}\n\nProduis le verdict JSON.`}]})});
  if(!res.ok)throw new Error(`Verdict ${res.status}`);
  const d=await res.json();return d.choices?.[0]?.message?.content??'{}';
}

function renderUser(text){const msgs=$('messages');const div=document.createElement('div');div.className='msg u';div.innerHTML=`<div class="mwho">Toi</div><div class="mbub">${esc(text)}</div>`;msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight}

function renderAI(raw){
  const msgs=$('messages'),p=PERSONAS[S.persona];
  const hasBin=raw.includes('[Réponds par oui ou non]');
  const display=raw.replace('[Réponds par oui ou non]','').trim();
  const div=document.createElement('div');div.className='msg a';
  div.innerHTML=`<div class="mwho">${p.icon} ${p.label}</div><div class="mbub">${esc(display)}</div>`;
  msgs.appendChild(div);
  if(hasBin){S.waitingBinary=true;showBinary();inputEl.disabled=true;sendEl.disabled=true}
  msgs.scrollTop=msgs.scrollHeight;
}

function showBinary(){
  removeBinary();
  const msgs=$('messages');
  const wrap=document.createElement('div');wrap.id='binaryWrap';wrap.className='binwrap';
  const oui=document.createElement('button');oui.className='binbtn boui';oui.textContent='Oui';oui.onclick=()=>sendMsg('Oui.');
  const non=document.createElement('button');non.className='binbtn bnon';non.textContent='Non';non.onclick=()=>sendMsg('Non.');
  wrap.appendChild(oui);wrap.appendChild(non);msgs.appendChild(wrap);msgs.scrollTop=msgs.scrollHeight;
}

function removeBinary(){const el=$('binaryWrap');if(el)el.remove();if(!S.loading){inputEl.disabled=false;sendEl.disabled=false}}

function showTyping(){
  const msgs=$('messages'),p=PERSONAS[S.persona];
  const div=document.createElement('div');div.className='msg a';div.id='typing';
  div.innerHTML=`<div class="mwho">${p.icon} ${p.label}</div><div class="tyb"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping(){const t=$('typing');if(t)t.remove()}

function setLoading(on){S.loading=on;if(!S.waitingBinary){inputEl.disabled=on;sendEl.disabled=on}if(!on&&!S.waitingBinary)inputEl.focus()}
function refreshTurns(){const t=S.turns;$('turnCount').textContent=`${t} échange${t>1?'s':''}`}

function renderVerdict(raw){
  let d;try{d=JSON.parse(raw.replace(/```json|```/g,'').trim())}catch{$('verdictBody').innerHTML=`<div class="vs"><p class="vst">${esc(raw)}</p></div>`;return}
  const secs=[{key:'strengths',label:'Tes arguments solides'},{key:'weaknesses',label:'Tes failles exposées'},{key:'fatal',label:"L'argument que tu n'as pas su contrer"}];
  let html=secs.map(({key,label})=>d[key]?`<div class="vs"><p class="vsl">${label}</p><p class="vst">${esc(d[key])}</p></div>`:'').join('');
  if(d.verdict)html+=`<div class="vs vsf"><p class="vsl">Verdict global</p><p class="vst">${esc(d.verdict)}</p></div>`;
  $('verdictBody').innerHTML=html;
}

function resetState(){S={conviction:'',persona:'philosopher',ferocity:'normal',mode:'attack',history:[],turns:0,loading:false,waitingBinary:false}}
</script>
</body>
</html>
